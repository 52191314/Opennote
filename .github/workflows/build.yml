name: Build iOS

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Get dependencies (packages)
        run: |
          flutter pub get --directory=packages/sbn
          flutter pub get --directory=packages/onyxsdk_pen

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          pod repo update
          flutter precache --ios

      - name: Build iOS (release, unsigned)
        run: |
          # Create export options plist with no signing
          mkdir -p ios/ExportOptions
          cat > ios/ExportOptions/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>-</string>
              <key>provisioningProfiles</key>
              <dict/>
              <key>generateLetMeSign</key>
              <false/>
          </dict>
          </plist>
          EOF

          # Build
          flutter build ios --release --no-codesign 2>&1

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: Opennote-iOS
          path: build/ios/iphoneos/Runner.app
