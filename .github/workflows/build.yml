name: Build iOS

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Get dependencies (packages)
        run: |
          flutter pub get --directory=packages/sbn
          flutter pub get --directory=packages/onyxsdk_pen

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          pod repo update
          flutter precache --ios

      - name: Build iOS (simulator)
        run: flutter build ios --debug --simulator 2>&1

      - name: Build iOS (device)
        run: flutter build ios --release --no-codesign --verbose 2>&1

      - name: Upload iOS build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Opennote-iOS
          path: build/ios/iphoneos/Runner.app
