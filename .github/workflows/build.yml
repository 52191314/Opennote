name: Build Opennote (iOS)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # iOS unsigned .ipa  — needs macOS (Xcode)
  # Install via SideStore / AltStore / LiveContainer
  # ─────────────────────────────────────────────
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter (beta)
        uses: subosito/flutter-action@v2
        with:
          channel: beta

      - name: pub get
        run: flutter pub get

      - name: CocoaPods
        run: pod install --repo-update
        working-directory: ios

      - name: Build unsigned release .app
        run: flutter build ios --release --no-codesign

      - name: Locate .app bundle
        run: |
          echo "=== Build output: ==="
          find build/ios -name "Runner.app" -type d

      - name: Package unsigned .ipa
        run: |
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "Found: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r Opennote-iOS.ipa Payload/
          rm -rf Payload
          echo "=== IPA contents: ==="
          unzip -l Opennote-iOS.ipa

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: Opennote-iOS
          path: Opennote-iOS.ipa
