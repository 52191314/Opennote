name: Build iOS

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: saber
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.x
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Get dependencies (packages)
        run: |
          flutter pub get --directory=packages/sbn
          flutter pub get --directory=packages/onyxsdk_pen

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: Opennote-iOS
          path: build/ios/iphoneos/Runner.app
