workflows:
  build-ios:
    name: Build iOS IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
          flutter pub get --directory=packages/sbn
          flutter pub get --directory=packages/onyxsdk_pen
      - name: Build iOS & package IPA
        script: |
          flutter build ios --release --no-codesign
          echo "=== Looking for Runner.app ==="
          find . -name "Runner.app" -type d 2>/dev/null
          APP="./build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP" ]; then
            APP=$(find . -name "Runner.app" -type d | head -1)
            echo "=== Found at: $APP ==="
          fi
          if [ ! -d "$APP" ]; then
            echo "ERROR: Runner.app not found!"
            exit 1
          fi
          echo "=== Packaging IPA from $APP ==="
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r Opennote.ipa Payload/
          rm -rf Payload/
          ls -lh Opennote.ipa
          echo "=== IPA created at $(pwd)/Opennote.ipa ==="
    artifacts:
      - Opennote.ipa
    publishing:
      email:
        recipients:
          - 52191314@qq.com
